<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Soluções — Gestão de Costura</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--sb:#1a1d27;--sb-hover:#252836;--sb-active:#4361ee;--sb-text:#a0a3b1;--primary:#4361ee;--success:#2ec4b6;--danger:#ef233c;--warning:#ff9f1c;--body:#f0f2f5;--card:#fff;--border:#e9ecef;--shadow:0 2px 16px rgba(0,0,0,.08);--radius:12px;--radius-sm:8px;--tr:all .2s ease;--sb-w:255px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--body);color:#2d3436;font-size:14px}
/* ── Sidebar ── */
.sidebar{width:var(--sb-w);background:var(--sb);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:1000;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.sb-brand{display:flex;align-items:center;gap:12px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.sb-logo{width:42px;height:42px;background:var(--primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.sb-brand-name{display:block;color:#fff;font-weight:700;font-size:15px}.sb-brand-sub{color:var(--sb-text);font-size:11px}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:8px 12px;background:rgba(255,255,255,.04);border-radius:var(--radius-sm)}
.sb-user i{font-size:28px;color:var(--sb-active)}.sb-user-name{display:block;color:#fff;font-weight:600;font-size:13px}.sb-user-role{font-size:11px;color:var(--sb-text)}
.sb-menu{list-style:none;padding:6px 0;flex:1}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--sb-text);text-decoration:none;transition:var(--tr);font-size:13.5px;cursor:pointer;border:none;background:none;width:100%}
.sb-link:hover{background:var(--sb-hover);color:#fff}.sb-link.active{background:var(--primary);color:#fff}
.sb-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#a5b4fc;border-radius:0 3px 3px 0}
.sb-link{position:relative}
.sb-icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}.sb-arrow{margin-left:auto;font-size:10px;transition:transform .2s}
.sb-link.collapsed .sb-arrow{transform:rotate(0)}.sb-link:not(.collapsed) .sb-arrow{transform:rotate(180deg)}
.sb-sub{background:rgba(0,0,0,.15)}.sb-sub ul{list-style:none;padding:4px 0}
.sb-sub ul a,.sb-sub ul button{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 44px;color:var(--sb-text);text-decoration:none;font-size:13px;transition:var(--tr);border:none;background:none;width:100%;cursor:pointer}
.sb-sub ul a:hover,.sb-sub ul button:hover{color:#fff;background:var(--sb-hover)}.sb-sub ul a.active,.sb-sub ul button.active{color:#a5b4fc}
.sb-sub ul i{width:14px;font-size:12px}.sb-divider{border-top:1px solid rgba(255,255,255,.05);margin:6px 16px}
.sb-footer{padding:10px 16px;color:rgba(255,255,255,.2);font-size:11px;text-align:center;border-top:1px solid rgba(255,255,255,.05)}
/* ── Layout ── */
.main{margin-left:var(--sb-w);display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.topbar h4{font-size:16px;font-weight:600;margin:0}
.page{padding:22px;flex:1}
/* ── Cards ── */
.stat-card{border-radius:var(--radius);padding:20px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:var(--tr)}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.stat-card::after{content:'';position:absolute;right:-20px;bottom:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1)}
.stat-card.blue{background:linear-gradient(135deg,#4361ee,#7209b7)}
.stat-card.red{background:linear-gradient(135deg,#ef233c,#d62839)}
.stat-card.green{background:linear-gradient(135deg,#2ec4b6,#06a77d)}
.stat-card.orange{background:linear-gradient(135deg,#ff9f1c,#f77f00)}
.stat-icon{font-size:26px;opacity:.85;margin-bottom:6px}
.stat-label{font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.stat-value{font-size:22px;font-weight:700;line-height:1.2}
.stat-sub{font-size:11px;opacity:.75;margin-top:3px}
/* ── Quick access ── */
.quick-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:18px 12px;background:#fff;border:2px solid var(--border);border-radius:var(--radius);text-decoration:none;color:#2d3436;transition:var(--tr);text-align:center;cursor:pointer}
.quick-btn:hover{border-color:var(--primary);background:#f0f4ff;color:var(--primary);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.quick-btn i{font-size:26px;color:var(--primary)}.quick-btn span{font-size:12px;font-weight:600}
/* ── Card ── */
.card{border:none!important;border-radius:var(--radius)!important;box-shadow:var(--shadow)!important}
.card-header{background:#fff!important;border-bottom:1px solid var(--border)!important;border-radius:var(--radius) var(--radius) 0 0!important;padding:13px 18px!important}
.card-header h6{margin:0;font-weight:600;font-size:14px}
/* ── Table ── */
.table{font-size:13px}.table th{font-weight:600;color:#636e72;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)!important}
.table td{vertical-align:middle;border-bottom:1px solid var(--border)!important}.table tbody tr:hover{background:#f8f9ff}
/* ── Badges ── */
.bs{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bs-fechada,.bs-pago,.bs-recebido{background:#d1fae5;color:#065f46}
.bs-aberta{background:#dbeafe;color:#1e40af}
.bs-cancelada,.bs-vencido{background:#fee2e2;color:#991b1b}
.bs-pendente{background:#fef3c7;color:#92400e}
/* ── Form ── */
.form-control,.form-select{border-radius:var(--radius-sm)!important;border-color:var(--border)!important;font-size:13px;padding:8px 12px}
.form-control:focus,.form-select:focus{box-shadow:0 0 0 3px rgba(67,97,238,.12)!important;border-color:var(--primary)!important}
.form-label{font-size:12px;font-weight:600;color:#636e72;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
/* ── Buttons ── */
.btn{border-radius:var(--radius-sm)!important;font-size:13px;font-weight:500}
.btn-primary{background:var(--primary)!important;border-color:var(--primary)!important}
.btn-primary:hover{background:#3451d1!important;border-color:#3451d1!important}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:6px!important}
/* ── PDV ── */
.pdv-wrap{display:grid;grid-template-columns:1fr 370px;gap:18px;height:calc(100vh - 100px)}
.pdv-col{display:flex;flex-direction:column;gap:14px;overflow:hidden}
.pdv-search{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.pdv-items{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);flex:1;display:flex;flex-direction:column;overflow:hidden}
.pdv-items .tbl-wrap{flex:1;overflow-y:auto}
.pdv-totals{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.pdv-total-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.pdv-total-row:last-child{border:none;font-size:18px;font-weight:700;color:var(--primary)}
.pdv-pay{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);flex:1}
.pay-btn{padding:10px 6px;text-align:center;border-radius:var(--radius-sm);cursor:pointer;border:2px solid var(--border);transition:var(--tr)}
.pay-btn:hover,.pay-btn.sel{border-color:var(--primary);background:#f0f4ff;color:var(--primary)}
.pay-btn i{font-size:18px;display:block;margin-bottom:3px}.pay-btn span{font-size:11px;font-weight:600}
.btn-fin{background:linear-gradient(135deg,var(--primary),#3451d1);color:#fff;border:none;border-radius:var(--radius)!important;padding:13px;font-size:16px;font-weight:700;width:100%;cursor:pointer;box-shadow:0 4px 12px rgba(67,97,238,.3);transition:var(--tr)}
.btn-fin:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(67,97,238,.4)}
/* ── Setup screen ── */
.setup-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--body)}
.setup-box{background:#fff;border-radius:var(--radius);padding:40px;max-width:520px;width:100%;box-shadow:var(--shadow)}
/* ── Toast ── */
.toast-container{position:fixed;top:16px;right:16px;z-index:9999}
/* ── Responsive ── */
@media(max-width:991px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.pdv-wrap{grid-template-columns:1fr}}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
/* ── Animation ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .25s ease}
/* ── Estoque alerts ── */
.est-baixo{background:#fff7ed}.est-zero{background:#fff1f2}
/* ── Modal ── */
.modal-content{border:none!important;border-radius:var(--radius)!important}
/* ── Nav pills ── */
.nav-pills .nav-link.active{background:var(--primary)!important}
.nav-pills .nav-link{color:#636e72;font-size:13px}
/* ── Loading ── */
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:40px;color:#636e72}
@media print{.sidebar,.topbar,.no-print{display:none!important}.main{margin:0!important}}
</style>
</head>
<body>

  <div class="setup-box text-center">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js" onerror="window.APP_CONFIG=null"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════════
let DEMO_MODE = false;
let supabaseClient = null;

// Credenciais Supabase — banco protegido por RLS + Auth (repositório privado)
const getSupaUrl = () => window.APP_CONFIG?.supabase_url || 'https://gcbqxfkpgoyxbammjdcs.supabase.co';
const getSupaKey = () => window.APP_CONFIG?.supabase_key || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjYnF4ZmtwZ295eGJhbW1qZGNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTYxMjksImV4cCI6MjA5ODQ3MjEyOX0.4q9JxwaT34lEL9Ubw4J2ZVgpgjxGW1OQt40oMMePVN8';


// Cache em memória
const Cache = {
  clientes: null, produtos: null, categorias: null, fornecedores: null,
  vendas: null, itens_venda: null, caixa: null, mov_caixa: null,
  kardex: null, contas_pagar: null, contas_receber: null, sublimacao: null, compras: null, contas_casa: null,
  clear(sheet) { if(sheet) this[sheet]=null; else Object.keys(this).forEach(k=>{ if(typeof this[k]!=='function') this[k]=null; }); }
};

// Demo data — zerado para teste limpo
const DemoData = {
  clientes:       [],
  produtos:       [],
  categorias:     [],
  fornecedores:   [],
  vendas:         [],
  itens_venda:    [],
  caixa:          [],
  mov_caixa:      [],
  kardex:         [],
  contas_pagar:   [],
  contas_receber: [],
  sublimacao:     [],
  compras:        [],
};

// ═══════════════════════════════════════════════════════
// API — Supabase + Demo
// ═══════════════════════════════════════════════════════
function apiDemo_getAll(sheet) { return (DemoData[sheet] || []).filter(r => r.ativo !== 0); }
function apiDemo_stats() {
  const hoje = new Date().toDateString();
  const vendasHoje = DemoData.vendas.filter(v => v.status==='fechada' && new Date(v.data).toDateString()===hoje);
  return { vendasHoje: vendasHoje.reduce((s,v)=>s+(v.total||0),0), qtdVendas: vendasHoje.length, totalProdutos: DemoData.produtos.length, totalClientes: DemoData.clientes.filter(c=>c.ativo!==0).length };
}
function apiDemo_chart() { const labels=[]; const values=[]; for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);labels.push(d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}));values.push(0);} return {labels,values}; }

async function getAll(sheet) {
  if (DEMO_MODE) {
    if (Cache[sheet]) return Cache[sheet];
    Cache[sheet] = apiDemo_getAll(sheet);
    return Cache[sheet];
  }
  if (Cache[sheet]) return Cache[sheet];
  const { data, error } = await supabaseClient.from(sheet).select('*').eq('ativo', 1).order('id', {ascending: false});
  if (error) throw new Error(error.message);
  Cache[sheet] = data || [];
  return Cache[sheet];
}

async function insert(sheet, obj) {
  if (DEMO_MODE) {
    const arr = DemoData[sheet] || [];
    const newId = arr.length ? Math.max(...arr.map(r=>r.id))+1 : 1;
    obj.id = newId; obj.ativo = obj.ativo !== undefined ? obj.ativo : 1;
    arr.push(obj); DemoData[sheet] = arr;
    Cache.clear(sheet);
    return { success:true, id:newId };
  }
  const { data, error } = await supabaseClient.from(sheet).insert(obj).select().single();
  if (error) throw new Error(error.message);
  Cache.clear(sheet);
  return { success:true, id: data.id };
}

async function update(sheet, id, obj) {
  if (DEMO_MODE) {
    const arr = DemoData[sheet] || [];
    const idx = arr.findIndex(r => String(r.id) === String(id));
    if (idx >= 0) Object.assign(arr[idx], obj);
    Cache.clear(sheet);
    return { success:true };
  }
  const { error } = await supabaseClient.from(sheet).update(obj).eq('id', id);
  if (error) throw new Error(error.message);
  Cache.clear(sheet);
  return { success:true };
}

async function remove(sheet, id) {
  if (DEMO_MODE) {
    const arr = DemoData[sheet] || [];
    const idx = arr.findIndex(r => String(r.id) === String(id));
    if (idx >= 0) arr[idx].ativo = 0;
    Cache.clear(sheet);
    return { success:true };
  }
  const { error } = await supabaseClient.from(sheet).update({ativo: 0}).eq('id', id);
  if (error) throw new Error(error.message);
  Cache.clear(sheet);
  return { success:true };
}

const localDateStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const fmtMoney = v => 'R$ ' + parseFloat(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const parseMoney = v => parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
const fmtDate = d => { if(!d) return '—'; const dt=new Date(d); return isNaN(dt)?d:dt.toLocaleDateString('pt-BR'); };
const fmtDateTime = d => { if(!d) return '—'; const dt=new Date(d); return isNaN(dt)?d:dt.toLocaleString('pt-BR'); };
const escHtml = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function toast(msg, type='success') {
  const id = 'toast_'+Date.now();
  const icon = type==='success'?'check-circle':'exclamation-circle';
  document.getElementById('toastContainer').insertAdjacentHTML('beforeend',
    `<div id="${id}" class="toast show align-items-center text-white bg-${type==='success'?'success':type==='warning'?'warning':'danger'} border-0 mb-2" role="alert">
      <div class="d-flex p-2 gap-2 align-items-center">
        <i class="fas fa-${icon}"></i><div class="toast-body py-0 px-0 flex-grow-1">${escHtml(msg)}</div>
        <button type="button" class="btn-close btn-close-white" onclick="document.getElementById('${id}').remove()"></button>
      </div>
    </div>`
  );
  setTimeout(() => document.getElementById(id)?.remove(), 4000);
}

function loading() {
  return `<div class="spinner-wrap"><div class="spinner-border text-primary"></div></div>`;
}

function openModal(titulo, corpo, rodape='', size='') {

function badgeStatus(s) {

function emptyState(icon, msg) {

async function conectar() {
  const email = (document.getElementById('loginUser').value || '').trim();
  const senha  = (document.getElementById('loginPass').value || '').trim();

  if (!email || !senha) { showSetupError('Preencha e-mail e senha.'); return; }

  const btn = document.querySelector('#setupScreen button.btn-primary');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Entrando...'; }

  let authData, authError;
  try {
    const resp = await supabaseClient.auth.signInWithPassword({ email, password: senha });
    authData = resp.data; authError = resp.error;
  } catch(e) {
    showSetupError('Erro de conexão. Verifique sua internet.');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Entrar'; }
    return;
  }
  if (authError) {
    showSetupError('E-mail ou senha incorretos.');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Entrar'; }
    return;
  }

  await carregarRole(authData.user);
  iniciarApp();
}

async function carregarRole(user) {
  if (!user) { window.APP_ROLE = 'admin'; return; }
  window.APP_EMAIL = user.email || '';
  try {
    const { data: perfil, error } = await supabaseClient.from('perfis').select('role').eq('id', user.id).single();
    if (!error && perfil?.role) {
      window.APP_ROLE = perfil.role;
    } else {
      // fallback: user_metadata
      window.APP_ROLE = user.user_metadata?.role || 'admin';
    }
  } catch(e) {
    window.APP_ROLE = user.user_metadata?.role || 'admin';
  }
}

function usarDemo() {
  DEMO_MODE = true;
  iniciarApp();
}

async function sair() {
  if(confirm('Sair do sistema?')) {
    if (supabaseClient) await supabaseClient.auth.signOut();
    location.reload();
  }
}

function showSetupError(msg) {
  const el = document.getElementById('setupError');
  el.textContent = msg; el.classList.remove('d-none');
}

function showInstructions() {
  const el = document.getElementById('modalInstrucoes');
  if (el) new bootstrap.Modal(el).show();
}

const PAGINAS_ADMIN = new Set(['dashboard','financeiro','relatorios','pdv','caixa','kardex','produtos','clientescad','contascasa','sublimacao','compras']);

function aplicarPermissoes() {
  const isOp = window.APP_ROLE === 'operador';
  const hide = id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };
  const show = id => { const el = document.getElementById(id); if (el) el.style.display = ''; };
  // Garante que todos aparecem antes de esconder os restritos
  ['menuDashboard','menuMovimento','menuFinanceiro','menuRelatorios','menuClientesCad','menuEstoque'].forEach(show);
  if (isOp) {
    hide('menuDashboard'); hide('menuMovimento'); hide('menuFinanceiro');
    hide('menuRelatorios'); hide('menuClientesCad'); hide('menuEstoque'); hide('menuContasCasa');
  }
  const roleEl = document.getElementById('sbUserRole');
  const nameEl = document.getElementById('sbUserName');
  if (roleEl) roleEl.textContent = isOp ? 'Operador' : 'Admin';
  if (nameEl && window.APP_EMAIL) nameEl.textContent = window.APP_EMAIL.split('@')[0];
}

function iniciarApp() {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('app').style.display = '';
  document.getElementById('pageDate').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if (!window.APP_ROLE) window.APP_ROLE = 'admin';
  aplicarPermissoes();
  nav(window.APP_ROLE === 'operador' ? 'clientes' : 'dashboard');
}

    page = 'clientes';
  }

  const titles = {
    dashboard:'Dashboard', clientes:'Uniforme', produtos:'Estoque',
    categorias:'Categorias', fornecedores:'Fornecedores', pdv:'PDV — Ponto de Venda',
    caixa:'Caixa', kardex:'Kardex — Estoque', financeiro:'Financeiro', relatorios:'Relatórios'
  };
  document.getElementById('pageTitle').textContent = titles[page] || page;

  const content = document.getElementById('pageContent');
  content.className = 'page fade-in';

  // Fecha sidebar mobile
  document.getElementById('sidebar').classList.remove('open');

  const renders = {

    caixa: renderCaixa, kardex: renderKardex, financeiro: () => renderFinanceiro(sub||'pagar'),
    relatorios: renderRelatorios
  };

  (renders[page] || renderDashboard)();
}

async function editarClienteCad(id) {
  const lista = await getAll('clientes_cad');
  const c = lista.find(x => x.id === id);
  if (c) novoClienteCad(c);
}

async function salvarClienteCad(id) {
  const nome = document.getElementById('ccNome').value.trim();
  if (!nome) { toast('Nome é obrigatório','danger'); return; }
  const data = {
    nome,
    cnpj:       document.getElementById('ccCnpj').value.trim(),
    telefone:   document.getElementById('ccTelefone').value.trim(),
    email:      document.getElementById('ccEmail').value.trim(),
    contato:    document.getElementById('ccContato').value.trim(),
    endereco:   document.getElementById('ccEndereco').value.trim(),
    bairro:     document.getElementById('ccBairro').value.trim(),
    cidade:     document.getElementById('ccCidade').value.trim(),
    estado:     document.getElementById('ccEstado').value.trim(),
    observacoes:document.getElementById('ccObs').value.trim(),
    ativo: 1
  };
  try {
    if (id) { await update('clientes_cad', id, data); toast('Cliente atualizado!'); }
    else     { await insert('clientes_cad', data);    toast('Cliente cadastrado!'); }
    closeModal(); Cache.clear('clientes_cad'); renderClientesCad();
  } catch(e) { toast(e.message,'danger'); }
}

async function removerClienteCad(id) {
  if (!confirm('Remover este cliente?')) return;
  await remove('clientes_cad', id);
  Cache.clear('clientes_cad');
  toast('Cliente removido.');
  renderClientesCad();
}

async function filtrarClientesCad(q) {
  const lista = document.getElementById('listaClientesCad');
  if (!lista) return;
  if (!q || q.length < 2) { lista.style.display='none'; lista.innerHTML=''; return; }
  try {
    const todos = await getAll('clientes_cad');
    const filtrados = todos.filter(c =>
      c.nome?.toLowerCase().includes(q.toLowerCase()) ||
      c.cnpj?.includes(q) || c.telefone?.includes(q)
    ).slice(0, 8);
    if (!filtrados.length) { lista.style.display='none'; return; }
    lista.innerHTML = filtrados.map(c => `
      <button type="button" class="list-group-item list-group-item-action py-2 px-3" onclick="preencherClienteCad(${c.id})">
        <div class="fw-semibold">${escHtml(c.nome)}</div>
        <small class="text-muted">${[c.cnpj, c.telefone, c.cidade].filter(Boolean).join(' · ')}</small>
      </button>`).join('');
    lista.style.display = 'block';
  } catch(e) {}
}

async function preencherClienteCad(id) {
  const todos = await getAll('clientes_cad');
  const c = todos.find(x => x.id === id);
  if (!c) return;
  const set = (elId, val) => { const el=document.getElementById(elId); if(el) el.value=val||''; };
  set('cNome',     c.nome);
  set('cCpfCnpj',  c.cnpj);
  set('cTel',      c.telefone);
  set('cEnd',      [c.endereco, c.cidade, c.estado].filter(Boolean).join(', '));
  set('buscaClienteCad', c.nome);
  document.getElementById('listaClientesCad').style.display = 'none';
  toast(`Cliente "${c.nome}" carregado!`);
}

let clienteSearch = '';

              <th>Entrega</th>
              <th>Valor Total</th>
              <th>Status Pgto</th>
              <th class="text-end pe-3">Ações</th>
            </tr></thead>
            <tbody>
            ${dados.length ? dados.map(c => {
              const saldo = (parseFloat(c.valor_total)||0) - (parseFloat(c.entrada)||0);
              const statusPgto = saldo <= 0 ? '<span class="badge bg-success">Pago</span>' : (parseFloat(c.entrada)>0 ? '<span class="badge bg-warning text-dark">Parcial</span>' : '<span class="badge bg-danger">Pendente</span>');
              const vencEntrega = c.data_entrega && new Date(c.data_entrega) < new Date() ? 'text-danger fw-semibold' : '';
              return `<tr>
                <td class="ps-3"><strong>${escHtml(c.nome)}</strong><br><small class="text-muted">${escHtml(c.endereco||'')}</small></td>
                <td>${escHtml(c.telefone||'—')}</td>

function updateDinamico(prefixo, selectId, containerId, labelBase, max) {
  const qtd = parseInt(document.getElementById(selectId).value)||0;
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  for(let i=1;i<=qtd;i++) {
    if (prefixo === 'silk') {
      container.innerHTML += `
        <div class="col-12">
          <div class="p-2 rounded mb-1" style="background:#f8f9fa;border:1px solid #dee2e6">
            <div class="row g-2 align-items-end">
              <div class="col-md-3"><label class="form-label small mb-1">CÓDIGO DE COR ${i}</label>
                <input class="form-control form-control-sm" id="${prefixo}_${i}" placeholder="Ex: 0001, Azul Royal..."></div>
              <div class="col-md-2"><label class="form-label small mb-1">QUANTIDADE</label>
                <input type="number" class="form-control form-control-sm" id="${prefixo}_qtd_${i}" min="0" step="1" placeholder="0" oninput="calcSilkTotal()"></div>
              <div class="col-md-2"><label class="form-label small mb-1">VALOR/UN (R$)</label>
                <div class="input-group input-group-sm"><span class="input-group-text">R$</span>
                <input type="number" class="form-control" id="${prefixo}_val_${i}" min="0" step="0.01" placeholder="0,00" oninput="calcSilkTotal()"></div></div>
              <div class="col-md-2"><label class="form-label small mb-1">TOTAL</label>
                <div class="input-group input-group-sm"><span class="input-group-text">R$</span>
                <input type="number" class="form-control" id="${prefixo}_tot_${i}" readonly style="background:#f0f4ff"></div></div>
            </div>
          </div>
        </div>`;
    } else {
      container.innerHTML += `<div class="col-md-3"><label class="form-label small">${labelBase} ${i}</label><input class="form-control form-control-sm" id="${prefixo}_${i}" placeholder="${labelBase} ${i}"></div>`;
    }
  }
}

function calcSilkTotal() {
  const qtd = parseInt(document.getElementById('silkQtd')?.value)||0;
  let total = 0;
  for(let i=1;i<=qtd;i++) {
    const q = parseFloat(document.getElementById(`silk_qtd_${i}`)?.value)||0;
    const v = parseFloat(document.getElementById(`silk_val_${i}`)?.value)||0;
    const t = q * v;
    total += t;
    const el = document.getElementById(`silk_tot_${i}`);
    if (el) el.value = t.toFixed(2);
  }
  calcResumo();
}

function calcTotalCostura() {
  const qtd = parseInt(document.getElementById('costuraQtd')?.value)||0;
  let total = 0;
  for(let i=1;i<=qtd;i++) {
    const pecas = parseFloat(document.getElementById(`costura_qtd_${i}`)?.value)||0;
    const valPeca = parseFloat(document.getElementById(`costura_val_${i}`)?.value)||0;
    const subtotal = pecas * valPeca;
    total += subtotal;
    const elT = document.getElementById(`costura_total_${i}`);
    if (elT) elT.value = subtotal.toFixed(2).replace('.',',');
  }
  const el = document.getElementById('costuraTotalValor');
  if (el) el.textContent = total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  calcResumo();
}

function renderLinhasPeca() {
  const n = parseInt(document.getElementById('cQtdTipos')?.value)||1;
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('pecaLinha'+i);
    if (el) el.style.display = i <= n ? '' : 'none';
  }
}

function calcResumo() {
  const nPecas    = parseInt(document.getElementById('cQtdTipos')?.value)||1;
  const valorTotal = parseFloat(document.getElementById('cValorTotal')?.value)||0;
  let qtdTotal = 0;
  for (let i = 1; i <= nPecas; i++) qtdTotal += parseFloat(document.getElementById(`cQtd${i}`)?.value)||0;

  const qtdC = parseInt(document.getElementById('costuraQtd')?.value)||0;
  let costura = 0;
  const costuraDetalhes = [];
  for(let i=1;i<=qtdC;i++) {
    const nome = document.getElementById(`costura_${i}`)?.value||`Costureira ${i}`;
    const q = parseFloat(document.getElementById(`costura_qtd_${i}`)?.value)||0;
    const vv = parseFloat(document.getElementById(`costura_val_${i}`)?.value)||0;
    const tot = q * vv;
    costura += tot;
    if (tot > 0) costuraDetalhes.push({ nome, tot });
  }
  const costuraRateio = costura;

  const setEl = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = fmtMoney(val); };

  let custoTotal = 0;
  for (let i = 1; i <= 5; i++) {
    const ativo = i <= nPecas;
    const tec = parseFloat(document.getElementById(`cTecidoValor${i}`)?.value)||0;
    const qtdPeca = parseFloat(document.getElementById(`cQtd${i}`)?.value)||0;
    // usa campo numérico; se vazio, tenta parsear o campo texto (ex: "2,50")
    const estampaNumerico = parseFloat(document.getElementById(`cEstampaValor${i}`)?.value)||0;
    const estampaTexto    = parseFloat((document.getElementById(`cEstampa${i}`)?.value||'').replace(',','.'))||0;
    const estampaUnit  = estampaNumerico || estampaTexto;
    const estampaValor = estampaUnit * qtdPeca;
    let aviaSum = 0;
    AVIAMENTOS_LIST.forEach(a => {
      const qtd = parseFloat(document.getElementById(`p${i}_avia_${a.key}_qtd`)?.value)||0;
      const val = parseFloat(document.getElementById(`p${i}_avia_${a.key}_val`)?.value)||0;
      const tot = qtd * val;
      aviaSum += tot;
      setEl(`p${i}_avia_${a.key}_tot`, tot);
    });
    const corteQtd = parseFloat(document.getElementById(`cCorteQtd${i}`)?.value)||0;
    const corteUn  = parseFloat(document.getElementById(`cCorteValor${i}`)?.value)||0;
    const corteTotal = corteQtd * corteUn;
    const total = ativo ? (tec + estampaValor + aviaSum + costuraRateio + corteTotal) : 0;
    const qtd   = parseFloat(document.getElementById(`cQtd${i}`)?.value)||0;
    const unit  = (total > 0 && qtd > 0) ? total / qtd : 0;
    setEl(`custoPeca${i}_tecido`,   tec);
    setEl(`custoPeca${i}_estampa`,  ativo ? estampaValor : 0);
    setEl(`custoPeca${i}_avia`,     ativo ? aviaSum      : 0);
    setEl(`custoPeca${i}_costura`, ativo ? costuraRateio : 0);
    const detEl = document.getElementById(`custoPeca${i}_costuraDetalhe`);
    if (detEl) detEl.innerHTML = ativo && costuraDetalhes.length > 1
      ? costuraDetalhes.map(d=>`${d.nome}: ${fmtMoney(d.tot)}`).join(' | ')
      : '';
    setEl(`custoPeca${i}_corte`,   ativo ? corteTotal   : 0);
    // Venda: usa campo específico da peça; se vazio, distribui valor_total pela qtd total
    const vendaUnitCampo = parseFloat(document.getElementById(`cVendaValor${i}`)?.value)||0;
    const vendaUnit = vendaUnitCampo > 0 ? vendaUnitCampo
                    : (qtdTotal > 0 ? valorTotal / qtdTotal : 0);
    const receita    = ativo && vendaUnit > 0 ? vendaUnit * qtdPeca : 0;
    const lucro      = ativo && vendaUnit > 0 ? receita - total : null;
    const lucroUnit  = ativo && vendaUnit > 0 ? vendaUnit - unit : null;
    setEl(`custoPeca${i}_total`,    total);
    setEl(`custoPeca${i}_unit`,     unit);
    const setLucro = (id, val) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (val === null) { el.textContent = '—'; el.style.color = ''; return; }
      el.textContent = (val >= 0 ? '+' : '') + fmtMoney(val);
      el.style.color = val >= 0 ? '#059669' : '#dc2626';
    };
    setLucro(`custoPeca${i}_lucro`,     lucro);
    setLucro(`custoPeca${i}_lucroUnit`, lucroUnit);
    if (ativo) custoTotal += total;
  }

  // Custos globais (calculados UMA vez, fora do loop de peças)
  const operacional = (parseFloat(document.getElementById('cUber')?.value)||0)
                    + (parseFloat(document.getElementById('cAlmoco')?.value)||0)
                    + (parseFloat(document.getElementById('cGasolina')?.value)||0)
                    + (parseFloat(document.getElementById('cEstacionamento')?.value)||0);
  const silkQtdN = parseInt(document.getElementById('silkQtd')?.value)||0;
  let silkTotal = 0;
  for(let s=1;s<=silkQtdN;s++) {
    const sq = parseFloat(document.getElementById(`silk_qtd_${s}`)?.value)||0;
    const sv = parseFloat(document.getElementById(`silk_val_${s}`)?.value)||0;
    silkTotal += sq * sv;
  }
  custoTotal += silkTotal + operacional;

  const lucro = valorTotal - custoTotal;
  const elC = document.getElementById('resumoCustoTotal');
  const elL = document.getElementById('resumoLucro');
  if (elC) elC.textContent = fmtMoney(custoTotal);
  if (elL) {
    elL.textContent = fmtMoney(lucro);
    elL.style.color = lucro >= 0 ? '#059669' : '#dc2626';
  }
}

    entrada:        parseFloat(document.getElementById('cEntrada').value)||0,
    forma_pagamento:document.getElementById('cFormaPag').value,
    obs_corte:        document.getElementById('cObsCorte')?.value||'',
    corte_qtd:        parseFloat(document.getElementById('cCorteQtd1').value)||0,
    corte_valor:      parseFloat(document.getElementById('cCorteValor1').value)||0,
    peca2_corte_qtd:  parseFloat(document.getElementById('cCorteQtd2').value)||0,
    peca2_corte_valor:parseFloat(document.getElementById('cCorteValor2').value)||0,
    peca3_corte_qtd:  parseFloat(document.getElementById('cCorteQtd3').value)||0,
    peca3_corte_valor:parseFloat(document.getElementById('cCorteValor3').value)||0,
    peca4_corte_qtd:  parseFloat(document.getElementById('cCorteQtd4').value)||0,
    peca4_corte_valor:parseFloat(document.getElementById('cCorteValor4').value)||0,
    peca5_corte_qtd:  parseFloat(document.getElementById('cCorteQtd5').value)||0,
    peca5_corte_valor:parseFloat(document.getElementById('cCorteValor5').value)||0,
    uber:           parseFloat(document.getElementById('cUber')?.value)||0,
    almoco:         parseFloat(document.getElementById('cAlmoco')?.value)||0,
    gasolina:       parseFloat(document.getElementById('cGasolina')?.value)||0,
    estacionamento: parseFloat(document.getElementById('cEstacionamento')?.value)||0,
    obs_acabamento: document.getElementById('cObsAcabamento').value,
    silk_qtd:       silkQtd,
    bordado_qtd:    bordadoQtd,
    costura_qtd:    costuraQtd,
    ...dinamicos,
    ativo: 1
  };
  try {
    if (id) {
      await update('clientes',id,data);
    } else {
      await insert('clientes', data);
    }

    const hoje = localDateStr();
    const venc = data.data_entrega || hoje;
    const desc = `${data.tipo_peca||'Uniforme'} — ${nome}`;

    // ── Contas a Receber: valor de venda ─────────────────
    if (!id && data.valor_total > 0) {
      const statusRec = data.entrada >= data.valor_total ? 'recebido'
                      : data.entrada > 0 ? 'parcial' : 'pendente';
      await insert('contas_receber', {
        descricao: `Venda: ${desc}`,
        cliente:   nome,
        valor:     data.valor_total,
        vencimento: venc,
        status:    statusRec,
        ativo: 1
      });
    }

    // ── Contas a Pagar: montar lista completa de custos ──
    const custos = [];

    // Tecido
    if (data.tecido_valor > 0) custos.push({ label: 'Tecido', val: data.tecido_valor });

    // Costura — uma entrada por costureira para rastreamento individual
    const nCostureiras = parseInt(data.costura_qtd)||0;
    for (let ci = 1; ci <= nCostureiras; ci++) {
      const nomeCost = dinamicos[`costura_${ci}`] || `Costureira ${ci}`;
      const qCost    = parseFloat(dinamicos[`costura_qtd_${ci}`])||0;
      const vCost    = parseFloat(dinamicos[`costura_val_${ci}`])||0;
      const totCost  = qCost * vCost;
      if (totCost > 0) custos.push({ label: `Costura — ${nomeCost}`, val: totCost, fornecedor: nomeCost });
    }

    // Aviamentos (soma de todas as peças)
    let totalAviamentos = 0;
    for (let pi = 1; pi <= 5; pi++) {
      try {
        const avObj = JSON.parse(data[`peca${pi}_aviamentos`] || '{}');
        Object.values(avObj).forEach(v => { totalAviamentos += (v.total || (v.qtd * v.val) || 0); });
      } catch(e) {}
    }
    if (totalAviamentos > 0) custos.push({ label: 'Aviamentos', val: totalAviamentos });

    // Corte (soma de todas as peças)
    let totalCorte = 0;
    const corteKeys = [['corte_qtd','corte_valor'],['peca2_corte_qtd','peca2_corte_valor'],
                       ['peca3_corte_qtd','peca3_corte_valor'],['peca4_corte_qtd','peca4_corte_valor'],
                       ['peca5_corte_qtd','peca5_corte_valor']];
    corteKeys.forEach(([q,v]) => { totalCorte += (parseFloat(data[q])||0) * (parseFloat(data[v])||0); });
    if (totalCorte > 0) custos.push({ label: 'Corte', val: totalCorte });

    // SILK (soma de todos os itens de silk)
    let totalSilk = 0;
    for (let s = 1; s <= 4; s++) totalSilk += (parseFloat(data[`silk_qtd_${s}`])||0) * (parseFloat(data[`silk_val_${s}`])||0);
    if (totalSilk > 0) custos.push({ label: 'SILK', val: totalSilk });

    // Custos operacionais (individualmente para rastreamento)
    if (data.uber          > 0) custos.push({ label: 'Uber',           val: data.uber });
    if (data.almoco        > 0) custos.push({ label: 'Almoço',         val: data.almoco });
    if (data.gasolina      > 0) custos.push({ label: 'Gasolina',       val: data.gasolina });
    if (data.estacionamento > 0) custos.push({ label: 'Estacionamento', val: data.estacionamento });

    // No update: apagar entradas pendentes anteriores para recriar atualizadas
    if (id) {
      const { data: existentes } = await supabaseClient
        .from('contas_pagar')
        .select('id,descricao,status')
        .like('descricao', `%— ${desc}`);
      const pendentesIds = (existentes||[]).filter(e=>e.status==='pendente').map(e=>e.id);
      if (pendentesIds.length > 0) {
        await supabaseClient.from('contas_pagar').delete().in('id', pendentesIds);
      }
    }

    // Inserir todos os custos
    for (const c of custos) {
      await insert('contas_pagar', {
        descricao:  `${c.label} — ${desc}`,
        fornecedor: c.fornecedor || 'Benetextil',
        valor:      c.val,
        vencimento: venc,
        status:     'pendente',
        ativo: 1
      });
    }
    Cache.clear('contas_pagar');

    const totalCustos = custos.reduce((s,c)=>s+c.val, 0);
    const lucro = data.valor_total - totalCustos;
    if (id) {
      toast(`Pedido atualizado! Custos: ${fmtMoney(totalCustos)} lançados em Contas a Pagar`);
    } else {
      toast(`Pedido cadastrado! ✔ A Receber: ${fmtMoney(data.valor_total)} | Custos: ${fmtMoney(totalCustos)} | Margem: ${fmtMoney(lucro)}`);
    }
    closeModal(); renderClientes();
  } catch(e) { toast(e.message,'danger'); }
}

async function delCliente(id, nome) {
  if (!confirm(`Excluir o cliente "${nome}"?`)) return;
  await remove('clientes',id); toast('Cliente removido.'); renderClientes();
}

function calcMaoObraAnderson() {
  const m2    = parseFloat(document.getElementById('mao_obra_anderson_m2')?.value)||0;
  const valor = parseFloat(document.getElementById('mao_obra_anderson_valor')?.value)||0;
  const total = m2 * valor;
  const el = document.getElementById('mao_obra_anderson');
  if (el) el.value = total.toFixed(2);
  calcTotalSublimacao();
}

async function buscarClienteSubl(q) {
  const lista = document.getElementById('sListaClientes');
  if (!lista) return;
  if (!q || q.length < 2) { lista.style.display='none'; return; }
  const todos = await getAll('clientes_cad');
  const res = todos.filter(c => c.nome.toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if (!res.length) { lista.style.display='none'; return; }
  lista.innerHTML = res.map(c => `<button type="button" class="list-group-item list-group-item-action py-1" onclick="preencherClienteSubl(${c.id})">${escHtml(c.nome)}${c.telefone?' — '+escHtml(c.telefone):''}</button>`).join('');
  lista.style.display='block';
}

async function preencherClienteSubl(id) {
  const todos = await getAll('clientes_cad');
  const c = todos.find(x=>x.id===id);
  if (!c) return;
  document.getElementById('sNomeCliente').value = c.nome||'';
  document.getElementById('sTelefoneCliente').value = c.telefone||'';
  document.getElementById('sEndereco').value = c.endereco||'';
  document.getElementById('sBuscaCliente').value = c.nome||'';
  document.getElementById('sListaClientes').style.display='none';
}

function limparClienteSubl() {
  ['sBuscaCliente','sNomeCliente','sTelefoneCliente','sEndereco'].forEach(id=>{
    const el = document.getElementById(id); if(el) el.value='';
  });
  const lista = document.getElementById('sListaClientes');
  if (lista) lista.style.display='none';
}

function calcTotalSublimacao() {
  const qtd = parseFloat(document.getElementById('qtd_metro')?.value)||0;
  const vMetro = parseFloat(document.getElementById('valor_metro')?.value)||0;
  const totalMetro = qtd * vMetro;
  const subEl = document.getElementById('subTotalMetro');
  if (subEl) subEl.textContent = totalMetro.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const vendaEl = document.getElementById('sValorVenda');
  const tecidoVendaEl = document.getElementById('sValorTecidoVenda');
  if (tecidoVendaEl && totalMetro > 0) tecidoVendaEl.value = totalMetro.toFixed(2);
  if (vendaEl && totalMetro > 0 && !vendaEl.value) vendaEl.value = totalMetro.toFixed(2);
  const outros = ['uber','almoco','gasolina','estacionamento','brim','mao_obra_anderson'].reduce((s,id)=>s+(parseFloat(document.getElementById(id)?.value)||0),0);
  const total = outros;
  const el = document.getElementById('sublimacaoTotalDisplay');
  if (el) el.textContent = total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

  const valorVenda = parseFloat(document.getElementById('sValorVenda')?.value)||0;
  const lucro = valorVenda - total;
  const elI = document.getElementById('subResumoInvestido');
  const elL = document.getElementById('subResumoLucro');
  if (elI) elI.textContent = fmtMoney(total);
  if (elL) {
    elL.textContent = fmtMoney(lucro);
    elL.style.color = lucro >= 0 ? '#059669' : '#dc2626';
  }
}

async function salvarSublimacao(id) {
  const descricao = document.getElementById('sDesc').value.trim();
  const data = {
    descricao,
    nome_cliente:     document.getElementById('sNomeCliente').value.trim(),
    telefone_cliente: document.getElementById('sTelefoneCliente').value.trim(),
    data_pedido:      document.getElementById('sDataPedido').value,
    data_entrega:     document.getElementById('sDataEntrega').value || null,
    endereco_cliente: document.getElementById('sEndereco').value.trim(),
    tecido:      document.getElementById('sTecido').value,
    cod_cor:     document.getElementById('sCodCor').value,
    qtd_metro:      parseFloat(document.getElementById('qtd_metro').value)||0,
    valor_metro:    parseFloat(document.getElementById('valor_metro').value)||0,
    uber:           parseFloat(document.getElementById('uber').value)||0,
    almoco:         parseFloat(document.getElementById('almoco').value)||0,
    gasolina:       parseFloat(document.getElementById('gasolina').value)||0,
    estacionamento: parseFloat(document.getElementById('estacionamento').value)||0,
    brim:           parseFloat(document.getElementById('brim').value)||0,
    mao_obra_anderson_m2:    parseFloat(document.getElementById('mao_obra_anderson_m2').value)||0,
    mao_obra_anderson_valor: parseFloat(document.getElementById('mao_obra_anderson_valor').value)||0,
    mao_obra_anderson:       parseFloat(document.getElementById('mao_obra_anderson').value)||0,
    valor_venda:    parseFloat(document.getElementById('sValorVenda').value)||0,
    ativo: 1
  };
  try {
    if (id) {
      await update('sublimacao',id,data);
      toast('Registro atualizado!');
    } else {
      await insert('sublimacao', data);

      // Calcula total gasto (tecido não entra — é valor cobrado do cliente)
      const totalGasto = data.uber + data.almoco + data.gasolina + data.estacionamento + data.brim + data.mao_obra_anderson;

      // Envia para Contas a Pagar se houver custo
      if (totalGasto > 0) {
        const hoje = localDateStr();

        // Detalha cada custo separado
        const itens = [
          { label: 'Uber',         val: data.uber },
          { label: 'Almoço',       val: data.almoco },
          { label: 'Gasolina',     val: data.gasolina },
          { label: 'Estacionamento', val: data.estacionamento },
          { label: 'Brim',         val: data.brim },
          { label: 'Mão de obra Anderson', val: data.mao_obra_anderson },
        ].filter(i => i.val > 0);

        for (const item of itens) {
          await insert('contas_pagar', {
            descricao:  `Sublimação — ${item.label}: ${descricao}`,
            fornecedor: 'Benetextil',
            valor:      item.val,
            vencimento: hoje,
            status:     'pendente',
            ativo: 1
          });
        }

        toast(`Salvo! Total gasto ${fmtMoney(totalGasto)} lançado em Contas a Pagar.`);
      } else {
        toast('Registro salvo!');
      }

      // Envia para Contas a Receber se houver valor de venda
      if (data.valor_venda > 0) {
        await insert('contas_receber', {
          descricao:  `Sublimação — ${descricao || data.nome_cliente || ''}`,
          cliente:    data.nome_cliente || '',
          valor:      data.valor_venda,
          vencimento: data.data_entrega || localDateStr(),
          status:     'pendente',
          ativo: 1
        });
      }
    }
    closeModal(); renderSublimacao();
  } catch(e) { toast(e.message,'danger'); }
}

async function delSublimacao(id, desc) {
  if (!confirm(`Excluir "${desc}"?`)) return;
  await remove('sublimacao',id); toast('Removido.'); renderSublimacao();
}

  </div>`,

   <button class="btn btn-primary" onclick="salvarCompra()"><i class="fas fa-save me-1"></i>Salvar</button>`

function atualizarPreviewCompra() {
  const n = parseInt(document.getElementById('cpParcelas')?.value)||1;
  const total = parseFloat(document.getElementById('cpValor')?.value)||0;
  const el = document.getElementById('cpPreview');
  if (!el) return;
  if (n <= 1 || total === 0) { el.innerHTML=''; return; }
  const parcela = total / n;
  el.innerHTML = `<div class="p-2 rounded" style="background:#fff3cd;border:1px solid #ffc107;font-size:0.85rem">
    <strong>${n}x de ${parcela.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</strong>
    — será lançado em Contas a Pagar com vencimentos mensais
  </div>`;
}

async function salvarCompra() {
  const produto = document.getElementById('cpProduto').value.trim();
  const desc = document.getElementById('cpDesc').value.trim();
  const valor = parseFloat(document.getElementById('cpValor').value)||0;
  if (!produto || !valor) { toast('Preencha produto e valor','danger'); return; }
  const n = parseInt(document.getElementById('cpParcelas').value)||1;
  const venc = document.getElementById('cpVenc').value;
  const forma = document.getElementById('cpFormaPag').value;
  const forn  = document.getElementById('cpFornecedor').value.trim();
  const obs   = document.getElementById('cpObs').value.trim();
  const data  = document.getElementById('cpData').value;
  try {
    await insert('compras', {
      produto, descricao: desc, fornecedor: forn, valor_total: valor,
      parcelas: n, forma_pagamento: forma, data_compra: data, observacoes: obs, ativo: 1
    });
    // Lança em Contas a Pagar
    const parcela = parseFloat((valor / n).toFixed(2));
    const [ano, mes, dia] = venc.split('-').map(Number);
    for (let i = 0; i < n; i++) {
      const d = new Date(ano, mes - 1 + i, dia);
      const vencP = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      await insert('contas_pagar', {
        descricao: n > 1 ? `${produto} (${i+1}/${n})` : produto,
        fornecedor: forn || 'Empresa',
        valor: parcela, vencimento: vencP,
        status: 'pendente', ativo: 1
      });
    }
    toast(n > 1 ? `Compra salva! ${n} parcelas lançadas em Contas a Pagar.` : 'Compra salva e lançada em Contas a Pagar!');
    closeModal(); Cache.clear('compras'); renderCompras();
  } catch(e) { toast(e.message,'danger'); }
}

async function delCompra(id, desc) {
  if (!confirm(`Excluir compra "${desc}"?`)) return;
  await remove('compras', id); toast('Removida.'); Cache.clear('compras'); renderCompras();
}

let prodSearch = '', prodCat = '';

async function renderProdutos(search, filtroTipo) {
  if (search !== undefined) prodSearch = search;
  if (filtroTipo !== undefined) prodCat = filtroTipo;
  try {
    let dados = await getAll('produtos');
    if (prodSearch) dados = dados.filter(p => (p.nome+' '+p.cod_cor+' '+p.descricao).toLowerCase().includes(prodSearch.toLowerCase()));
    if (prodCat) dados = dados.filter(p => p.tipo === prodCat);

function toggleCampoProduto() {
  // Botão não tem código de cor específico, mas mantemos o campo visível
  // (pode ser usado para tamanho/modelo do botão)
  const isBotao = document.getElementById('tipoBotao')?.checked;
  const wrap = document.getElementById('wrapCodCor');
  if (wrap) {
    wrap.querySelector('label').textContent = isBotao ? 'Modelo / Tamanho' : 'Código da Cor';
    wrap.querySelector('input').placeholder = isBotao ? 'Ex: 20mm, 4 furos...' : 'Ex: 0025, Preto 001...';
  }
}

async function salvarProduto(id) {
  const nome = document.getElementById('pNome').value.trim();
  if (!nome) { toast('Nome é obrigatório','danger'); return; }
  const tipo = document.querySelector('input[name="pTipo"]:checked')?.value || 'Linha';
  const data = {
    tipo, nome,
    cod_cor:        document.getElementById('pCodCor').value,
    estoque:        parseInt(document.getElementById('pEst').value)||0,
    // campos legados para compatibilidade com PDV/kardex
    codigo: nome, categoria: tipo, unidade:'UN', preco_custo:0, preco_venda:0,
    ativo: 1
  };
  try {
    if (id) await update('produtos',id,data); else await insert('produtos',data);
    toast(id?'Item atualizado!':'Item adicionado ao estoque!'); closeModal(); renderProdutos();
  } catch(e) { toast(e.message,'danger'); }
}

async function delProduto(id, nome) {
  if (!confirm(`Excluir "${nome}" do estoque?`)) return;
  await remove('produtos',id); toast('Item removido.'); renderProdutos();
}

let cart = [], pdvPayMethod = 'dinheiro', pdvClienteId = '', pdvClienteNome = 'Consumidor Final';

async function renderPDV() {

  document.getElementById('pageContent').innerHTML = `

      </div>

          ${[['dinheiro','fas fa-money-bill-wave','Dinheiro'],['cartao_credito','fas fa-credit-card','Crédito'],
             ['cartao_debito','fas fa-credit-card','Débito'],['pix','fas fa-qrcode','PIX'],

            ].map(([k,ic,lb])=>`<div class="col-6"><div class="pay-btn${k==='dinheiro'?' sel':''}" onclick="pdvPaySel('${k}',this)" data-method="${k}">

async function pdvBuscar() {
  const q = document.getElementById('pdvQ').value.trim();
  if (!q) return;
  try {
    const prods = await getAll('produtos');
    const p = prods.find(x => x.codigo===q || x.nome.toLowerCase().includes(q.toLowerCase()));
    if (!p) { toast('Produto não encontrado','warning'); return; }
    const idx = cart.findIndex(i=>i.id===p.id);
    if (idx>=0) cart[idx].qty++;
    else cart.push({id:p.id,nome:p.nome,qty:1,preco:parseFloat(p.preco_venda)||0,desconto:0});
    document.getElementById('pdvQ').value='';
    document.getElementById('pdvQ').focus();
    pdvRender();
  } catch(e) { toast(e.message,'danger'); }
}

function pdvSetCliente(sel) {
  pdvClienteId = sel.value;
  pdvClienteNome = sel.options[sel.selectedIndex].dataset.nome || 'Consumidor Final';
}

function pdvPaySel(method, el) {
  pdvPayMethod = method;
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  pdvCalcTroco();
}

function pdvRender() {
  const body = document.getElementById('pdvBody');
  if (!body) return;
  const sub = cart.reduce((s,i)=>s+i.qty*i.preco,0);
  const desc = cart.reduce((s,i)=>s+i.desconto,0);
  const tot = sub - desc;

  body.innerHTML = cart.length ? cart.map((item,i)=>{
    const total = item.qty*item.preco - item.desconto;
    return `<tr>
      <td class="ps-3 text-muted">${i+1}</td>
      <td>${escHtml(item.nome)}</td>
      <td><input type="number" class="form-control form-control-sm" style="width:70px" value="${item.qty}" min="0.001" step="0.001" onchange="pdvUpdQty(${i},this.value)"></td>
      <td>${fmtMoney(item.preco)}</td>
      <td><input type="number" class="form-control form-control-sm" style="width:70px" value="${item.desconto}" min="0" step="0.01" onchange="pdvUpdDesc(${i},this.value)"></td>
      <td class="fw-semibold">${fmtMoney(total)}</td>
      <td><button class="btn btn-icon btn-outline-danger btn-sm" onclick="cart.splice(${i},1);pdvRender()"><i class="fas fa-times"></i></button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="7" class="text-center text-muted py-4"><i class="fas fa-shopping-cart fa-3x mb-3 d-block opacity-25"></i>Nenhum item</td></tr>`;

  document.getElementById('pdvQtd').textContent = cart.length;
  document.getElementById('pdvSub').textContent = fmtMoney(sub);
  document.getElementById('pdvDesc').textContent = fmtMoney(desc);
  document.getElementById('pdvTot').textContent = fmtMoney(tot);
  pdvCalcTroco();
}

function pdvUpdQty(i,v) { const n=parseFloat(v); if(n<=0){cart.splice(i,1);}else cart[i].qty=n; pdvRender(); }
function pdvUpdDesc(i,v) { cart[i].desconto=parseFloat(v)||0; pdvRender(); }

function pdvCalcTroco() {
  const totEl = document.getElementById('pdvTot');
  if (!totEl) return;
  const tot = parseMoney(totEl.textContent.replace('R$ ',''));
  const rec = parseFloat(document.getElementById('pdvRecebido')?.value||0);
  const troco = pdvPayMethod==='dinheiro' ? Math.max(0,rec-tot) : 0;
  const trocoEl = document.getElementById('pdvTroco');
  if (trocoEl) trocoEl.textContent = fmtMoney(troco);
}

function pdvClear() { if(confirm('Limpar todos os itens?')) { cart=[]; pdvRender(); } }

async function pdvFinalizar() {
  if (!cart.length) { toast('Adicione pelo menos um item','warning'); return; }
  const sub = cart.reduce((s,i)=>s+i.qty*i.preco,0);
  const desc = cart.reduce((s,i)=>s+i.desconto,0);
  const total = sub - desc;
  const recebido = parseFloat(document.getElementById('pdvRecebido').value||total);
  const troco = pdvPayMethod==='dinheiro' ? Math.max(0,recebido-total) : 0;

  // Gera número da venda
  const vendas = await getAll('vendas');
  const lastNum = vendas.reduce((m,v)=>Math.max(m,parseInt(v.numero||0)),0);
  const numero = String(lastNum+1).padStart(6,'0');

  const venda = { numero, cliente_id:pdvClienteId||null, cliente_nome:pdvClienteNome,
    data:new Date().toISOString(), forma_pagamento:pdvPayMethod,
    subtotal:sub, desconto:desc, total, status:'fechada' };

  try {
    const res = await insert('vendas', venda);
    // Salva itens
    for (const item of cart) {
      await insert('itens_venda', {venda_id:res.id, produto_id:item.id, produto_nome:item.nome,
        quantidade:item.qty, preco:item.preco, desconto:item.desconto, total:item.qty*item.preco-item.desconto});
      // Baixa estoque
      const prods = await getAll('produtos');
      const p = prods.find(x=>x.id===item.id);
      if (p) {
        const novoEst = Math.max(0, parseFloat(p.estoque||0) - item.qty);
        await update('produtos', item.id, {estoque: novoEst});
        // Kardex
        await insert('kardex', {produto_id:item.id, produto_nome:item.nome, tipo:'saida',
          quantidade:item.qty, saldo_anterior:parseFloat(p.estoque||0), saldo_atual:novoEst,
          descricao:`Venda ${numero}`, data:new Date().toISOString()});
      }
    }
    Cache.clear();
    toast(`Venda ${numero} finalizada! ${troco>0?'Troco: '+fmtMoney(troco):''}`);
    cart = [];
    pdvRender();
    document.getElementById('pdvRecebido').value = '';
    if (troco>0) setTimeout(()=>alert(`Troco: ${fmtMoney(troco)}`),300);
  } catch(e) { toast(e.message,'danger'); }
}

async function confirmAbrirCaixa() {

  openModal(`<i class="fas fa-exchange-alt me-2"></i>${tipo==='sangria'?'Sangria':'Suprimento'}`,
    `<div class="mb-3"><label class="form-label">Valor (R$)</label><div class="input-group"><span class="input-group-text">R$</span>

  );

async function confirmMovCaixa(tipo, caixaId) {
  const valor = parseFloat(document.getElementById('movValor').value)||0;
  if (valor<=0) { toast('Valor inválido','danger'); return; }
  const desc = document.getElementById('movDesc').value;
  await insert('mov_caixa',{caixa_id:caixaId,tipo,valor,descricao:desc,data:new Date().toISOString()});
  toast('Movimentação registrada!'); closeModal(); Cache.clear('mov_caixa'); renderCaixa();
}

async function fecharCaixa(id) {
  const valor = prompt('Informe o valor em caixa (R$):','0.00');
  if (valor===null) return;
  await update('caixa',id,{status:'fechado',data_fechamento:new Date().toISOString(),valor_fechamento:parseFloat(valor)||0});
  toast('Caixa fechado!'); Cache.clear('caixa'); renderCaixa();
}

  );

async function salvarKardex() {
  const sel = document.getElementById('kProd');
  const prodId = parseInt(sel.value);
  const tipo = document.getElementById('kTipo').value;
  const qtd = parseFloat(document.getElementById('kQtd').value)||0;
  const desc = document.getElementById('kDesc').value;
  if (!prodId||qtd<=0) { toast('Produto e quantidade são obrigatórios','danger'); return; }

  const opt = sel.options[sel.selectedIndex];
  const nome = opt.dataset.nome;
  const estAnt = parseFloat(opt.dataset.est)||0;
  let estNovo = tipo==='entrada' ? estAnt+qtd : tipo==='saida' ? Math.max(0,estAnt-qtd) : qtd;

  try {
    await update('produtos', prodId, {estoque:estNovo});
    await insert('kardex',{produto_id:prodId,produto_nome:nome,tipo,quantidade:qtd,
      saldo_anterior:estAnt,saldo_atual:estNovo,descricao:desc,data:new Date().toISOString()});
    toast('Movimentação registrada!'); closeModal(); Cache.clear(); renderKardex();
  } catch(e) { toast(e.message,'danger'); }
}

async function renderFinanceiro(sub='pagar') {
  document.getElementById('pageTitle').textContent = sub==='pagar'?'Contas a Pagar':sub==='receber'?'Contas a Receber':sub==='funcionarios'?'Funcionários':'Fluxo de Caixa';
  try {
    const tabs = `<ul class="nav nav-pills mb-4 gap-1">
      <li class="nav-item"><button class="nav-link ${sub==='pagar'?'active':''}" onclick="renderFinanceiro('pagar')"><i class="fas fa-file-invoice-dollar me-1"></i>A Pagar</button></li>
      <li class="nav-item"><button class="nav-link ${sub==='receber'?'active':''}" onclick="renderFinanceiro('receber')"><i class="fas fa-hand-holding-usd me-1"></i>A Receber</button></li>
      <li class="nav-item"><button class="nav-link ${sub==='fluxo'?'active':''}" onclick="renderFinanceiro('fluxo')"><i class="fas fa-chart-line me-1"></i>Fluxo</button></li>
      <li class="nav-item"><button class="nav-link ${sub==='funcionarios'?'active':''}" onclick="renderFinanceiro('funcionarios')"><i class="fas fa-users me-1"></i>Funcionários</button></li>
    </ul>`;

    if (sub==='funcionarios') {
      const hoje = new Date();
      const mesAtual = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;
      const [anoSel, mesSel] = (window._funcMes || mesAtual).split('-').map(Number);
      const mesFiltro = window._funcMes || mesAtual;

      const contasPagar = await getAll('contas_pagar');
      // Entradas de costura do mês selecionado
      const entradas = contasPagar.filter(c =>
        c.descricao && c.descricao.startsWith('Costura —') &&
        c.vencimento && c.vencimento.startsWith(mesFiltro)
      );

      // Extrair nome da costureira: usa fornecedor se não for 'Benetextil',
      // senão tenta parsear do formato novo "Costura — NomeCostureira — Pedido"
      const getNomeCostureira = c => {
        if (c.fornecedor && c.fornecedor !== 'Benetextil') return c.fornecedor;
        const m = (c.descricao||'').match(/^Costura — (.+?) — /);
        return m ? m[1] : (c.fornecedor || 'Sem nome');
      };

      // Agrupar por nome da costureira
      const por_func = {};
      entradas.forEach(c => {
        const nome = getNomeCostureira(c);
        if (!por_func[nome]) por_func[nome] = { pendente: 0, pago: 0, itens: [] };
        const val = parseFloat(c.valor)||0;
        por_func[nome][c.status==='pago'?'pago':'pendente'] += val;
        por_func[nome].itens.push(c);
      });

      const nomes = Object.keys(por_func).sort();
      const totalPendente = nomes.reduce((s,n)=>s+por_func[n].pendente,0);
      const totalPago     = nomes.reduce((s,n)=>s+por_func[n].pago,0);

      // Seletor de mês (últimos 12 meses)
      const meses = [];
      for (let i=0;i<12;i++) { const d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1); meses.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`); }
      const nomeMes = new Date(anoSel,mesSel-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

      document.getElementById('pageContent').innerHTML = tabs + `
      <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
        <h5 class="mb-0"><i class="fas fa-users me-2 text-primary"></i>Folha de Pagamento</h5>
        <select class="form-select form-select-sm" style="max-width:180px" onchange="window._funcMes=this.value;renderFinanceiro('funcionarios')">
          ${meses.map(m=>`<option value="${m}" ${m===mesFiltro?'selected':''}>${new Date(m+'-02').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</option>`).join('')}
        </select>
        <span class="text-muted small">Referência: <strong>${nomeMes}</strong></span>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-sm-4"><div class="card text-center p-3 border-danger">
          <div class="text-danger mb-1"><i class="fas fa-clock fa-2x"></i></div>
          <div class="fs-5 fw-bold text-danger">${fmtMoney(totalPendente)}</div>
          <small class="text-muted">A Pagar este mês</small>
        </div></div>
        <div class="col-sm-4"><div class="card text-center p-3 border-success">
          <div class="text-success mb-1"><i class="fas fa-check-circle fa-2x"></i></div>
          <div class="fs-5 fw-bold text-success">${fmtMoney(totalPago)}</div>
          <small class="text-muted">Já Pago este mês</small>
        </div></div>
        <div class="col-sm-4"><div class="card text-center p-3">
          <div class="text-primary mb-1"><i class="fas fa-users fa-2x"></i></div>
          <div class="fs-5 fw-bold">${nomes.length}</div>
          <small class="text-muted">Funcionária(s)</small>
        </div></div>
      </div>

      ${nomes.length === 0 ? `<div class="alert alert-info">Nenhum lançamento de costura encontrado para este mês. Os lançamentos são criados automaticamente ao salvar pedidos de uniforme.</div>` :
        nomes.map(nome => {
          const f = por_func[nome];
          const total = f.pendente + f.pago;
          const pct = total > 0 ? Math.round((f.pago/total)*100) : 0;
          return `
          <div class="card mb-3">
            <div class="card-header d-flex align-items-center justify-content-between flex-wrap gap-2">
              <div class="d-flex align-items-center gap-2">
                <div style="width:36px;height:36px;border-radius:50%;background:#4361ee22;display:flex;align-items:center;justify-content:center">
                  <i class="fas fa-user text-primary"></i>
                </div>
                <div>
                  <div class="fw-bold">${escHtml(nome)}</div>
                  <small class="text-muted">${f.itens.length} pedido(s) no mês</small>
                </div>
              </div>
              <div class="text-end">
                <div class="fw-bold fs-5 ${f.pendente>0?'text-danger':'text-success'}">${fmtMoney(f.pendente > 0 ? f.pendente : f.pago)}</div>
                <small class="${f.pendente>0?'text-danger':'text-success'}">${f.pendente>0?'A pagar':'Pago'}</small>
              </div>
            </div>
            <div class="card-body pt-2 pb-2">
              <div class="d-flex align-items-center gap-2 mb-2">
                <div class="progress flex-grow-1" style="height:8px">
                  <div class="progress-bar bg-success" style="width:${pct}%"></div>
                </div>
                <small class="text-muted">${pct}% pago</small>
              </div>
              <div class="table-responsive">
                <table class="table table-sm mb-0">
                  <thead><tr><th>Pedido</th><th class="text-end">Valor</th><th class="text-center">Status</th><th class="text-center no-print">Ação</th></tr></thead>
                  <tbody>
                  ${f.itens.map(it=>`<tr>
                    <td><small>${escHtml((it.descricao||'').replace(/^Costura — [^—]+ — /,''))}</small></td>
                    <td class="text-end fw-semibold">${fmtMoney(it.valor)}</td>
                    <td class="text-center"><span class="badge ${it.status==='pago'?'bg-success':'bg-warning text-dark'}">${it.status==='pago'?'Pago':'Pendente'}</span></td>

      const totalSai = pagos.filter(p=>p.status==='pago').reduce((s,p)=>s+parseFloat(p.valor||0),0);
