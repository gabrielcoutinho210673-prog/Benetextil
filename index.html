      const saldo = totalEnt - totalSai;
      document.getElementById('pageContent').innerHTML = tabs + `
      <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="card text-center p-3">
          <div class="text-success mb-1"><i class="fas fa-arrow-down fa-2x"></i></div>
          <div class="fs-5 fw-bold text-success">${fmtMoney(totalEnt)}</div>
          <small class="text-muted">Recebido</small>
          ${totalPend>0?`<div class="mt-1 text-warning fw-semibold" style="font-size:0.82rem">+ ${fmtMoney(totalPend)} a receber</div>`:''}
        </div></div>
        <div class="col-md-4"><div class="card text-center p-3">
          <div class="text-danger mb-1"><i class="fas fa-arrow-up fa-2x"></i></div>
          <div class="fs-5 fw-bold text-danger">${fmtMoney(totalSai)}</div>
          <small class="text-muted">Pago</small>
          ${totalPagar>0?`<div class="mt-1 text-warning fw-semibold" style="font-size:0.82rem">+ ${fmtMoney(totalPagar)} a pagar</div>`:''}
        </div></div>
        <div class="col-md-4"><div class="card text-center p-3">
          <div class="${saldo>=0?'text-primary':'text-danger'} mb-1"><i class="fas fa-balance-scale fa-2x"></i></div>
          <div class="fs-5 fw-bold ${saldo>=0?'text-primary':'text-danger'}">${fmtMoney(saldo)}</div>
          <small class="text-muted">Saldo (recebido − pago)</small>
        </div></div>
      </div>`;
      return;
    }

    const sheet = sub==='pagar' ? 'contas_pagar' : 'contas_receber';
    const todosOsDados = await getAll(sheet);

    // datas padrão: primeiro dia do mês atual até último
    const hoje = new Date();
    const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
    const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth()+1, 0).toISOString().split('T')[0];

    const filtroHtml = `
    <div class="card mb-3 p-3">
      <div class="row g-2 align-items-end">
        <div class="col-auto"><label class="form-label mb-1 small text-muted">Vencimento de</label>
          <input type="date" id="filtDe" class="form-control form-control-sm" value="${primeiroDia}"></div>
        <div class="col-auto"><label class="form-label mb-1 small text-muted">até</label>
          <input type="date" id="filtAte" class="form-control form-control-sm" value="${ultimoDia}"></div>
        <div class="col-auto"><label class="form-label mb-1 small text-muted">Status</label>
          <select id="filtStatus" class="form-select form-select-sm">
            <option value="">Todos</option>
            <option value="pendente">Pendente</option>
            <option value="${sub==='pagar'?'pago':'recebido'}">${sub==='pagar'?'Pago':'Recebido'}</option>
            <option value="cancelado">Cancelado</option>
          </select></div>
        <div class="col-auto">
          <button class="btn btn-primary btn-sm" onclick="aplicarFiltroFinanceiro('${sub}','${sheet}')"><i class="fas fa-filter me-1"></i>Filtrar</button>
          <button class="btn btn-outline-secondary btn-sm ms-1" onclick="limparFiltroFinanceiro('${sub}')"><i class="fas fa-times me-1"></i>Limpar</button>
        </div>
      </div>
    </div>`;

    function renderTabelaFinanceiro(dados) {
      const total = dados.reduce((s,c)=>s+parseFloat(c.valor||0),0);
      const pend = dados.filter(c=>c.status==='pendente').reduce((s,c)=>s+parseFloat(c.valor||0),0);
      document.getElementById('finResumo').innerHTML = `
        <div class="col-md-4"><div class="card text-center p-3"><div class="text-warning mb-1"><i class="fas fa-clock fa-2x"></i></div>
          <div class="fs-5 fw-bold">${fmtMoney(pend)}</div><small class="text-muted">Pendente</small></div></div>
        <div class="col-md-4"><div class="card text-center p-3"><div class="${sub==='pagar'?'text-danger':'text-success'} mb-1"><i class="fas fa-${sub==='pagar'?'arrow-up':'arrow-down'} fa-2x"></i></div>
          <div class="fs-5 fw-bold">${fmtMoney(total)}</div><small class="text-muted">Total em Aberto</small></div></div>`;
      document.getElementById('finTabela').innerHTML = dados.length ? dados.map(c=>{
        const venc = new Date(c.vencimento);
        const atrasado = venc < new Date() && !['pago','recebido','cancelado'].includes(c.status);
        return `<tr>
          <td class="ps-3">${escHtml(c.descricao)}</td>
          <td>${escHtml(sub==='pagar'?c.fornecedor:c.cliente||'—')}</td>
          <td class="fw-semibold">${fmtMoney(c.valor)}</td>
          <td class="${atrasado?'text-danger fw-semibold':''}">${fmtDate(c.vencimento)}${atrasado?'<i class="fas fa-exclamation-triangle ms-1"></i>':''}</td>
          <td>${badgeStatus(c.status)}</td>
          <td class="text-end pe-3">
            ${!['pago','recebido','cancelado'].includes(c.status)?
              `<button class="btn btn-icon btn-outline-success btn-sm" onclick="baixarConta('${sheet}',${c.id},'${sub==='pagar'?'pago':'recebido'}')" title="Dar baixa"><i class="fas fa-check"></i></button>`:''}
            <button class="btn btn-icon btn-outline-danger btn-sm" onclick="delConta('${sheet}',${c.id})"><i class="fas fa-trash"></i></button>
          </td></tr>`;}).join('')
        : `<tr><td colspan="6">${emptyState('file-invoice','Nenhuma conta registrada')}</td></tr>`;
    }

    window._finDados = todosOsDados;
    window._finSub = sub;
    window._finSheet = sheet;

    window.aplicarFiltroFinanceiro = function(s, sh) {
      const de = document.getElementById('filtDe').value;
      const ate = document.getElementById('filtAte').value;
      const st = document.getElementById('filtStatus').value;
      const filtrado = window._finDados.filter(c => {
        const v = c.vencimento ? c.vencimento.split('T')[0] : '';
        if (de && v < de) return false;
        if (ate && v > ate) return false;
        if (st && c.status !== st) return false;
        return true;
      });
      renderTabelaFinanceiro(filtrado);
    };

    window.limparFiltroFinanceiro = function(s) {
      document.getElementById('filtDe').value = '';
      document.getElementById('filtAte').value = '';
      document.getElementById('filtStatus').value = '';
      renderTabelaFinanceiro(window._finDados);
    };

    // filtra pelo mês atual por padrão
    const dadosFiltrados = todosOsDados.filter(c => {
      const v = c.vencimento ? c.vencimento.split('T')[0] : '';
      return v >= primeiroDia && v <= ultimoDia;
    });

    document.getElementById('pageContent').innerHTML = tabs + filtroHtml + `
    <div class="row g-3 mb-4" id="finResumo">
    </div>
    <div class="row g-3 mb-3"><div class="col-12 d-flex justify-content-end">
      <button class="btn btn-primary" onclick="formConta('${sub}')"><i class="fas fa-plus me-1"></i>Nova Conta</button>
    </div></div>
    <div class="card">
      <div class="card-body p-0">
        <table class="table mb-0">
          <thead><tr><th class="ps-3">Descrição</th><th>${sub==='pagar'?'Fornecedor':'Cliente'}</th><th>Valor</th><th>Vencimento</th><th>Status</th><th class="text-end pe-3">Ações</th></tr></thead>
          <tbody id="finTabela"></tbody>
        </table>
      </div>
    </div>`;

    renderTabelaFinanceiro(dadosFiltrados);
  } catch(e) { toast(e.message,'danger'); }
}

function formConta(tipo) {
  openModal(`<i class="fas fa-plus me-2"></i>Nova Conta a ${tipo==='pagar'?'Pagar':'Receber'}`,
    `<div class="row g-3">
      <div class="col-12"><label class="form-label fw-semibold">DESCRIÇÃO *</label><input class="form-control" id="ctDesc"></div>
      <div class="col-12"><label class="form-label fw-semibold">${tipo==='pagar'?'FORNECEDOR':'CLIENTE'}</label><input class="form-control" id="ctEnt"></div>
      <div class="col-md-6"><label class="form-label fw-semibold">VALOR TOTAL *</label><div class="input-group"><span class="input-group-text">R$</span><input type="number" id="ctValor" class="form-control" step="0.01" min="0" oninput="atualizarPreviewParcelas()"></div></div>
      <div class="col-md-6"><label class="form-label fw-semibold">1º VENCIMENTO *</label><input type="date" id="ctVenc" class="form-control" value="${localDateStr()}"></div>
      <div class="col-12">
        <label class="form-label fw-semibold">PARCELAMENTO</label>
        <select class="form-select" id="ctParcelas" onchange="atualizarPreviewParcelas()">
          <option value="1">À Vista (1x)</option>
          <option value="2">2x</option>
          <option value="3">3x</option>
          <option value="4">4x</option>
          <option value="5">5x</option>
        </select>
      </div>
      <div class="col-12" id="ctPreviewParcelas"></div>
    </div>`,
    `<button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
     <button class="btn btn-primary" onclick="salvarConta('${tipo}')"><i class="fas fa-save me-1"></i>Salvar</button>`
  );
}

function atualizarPreviewParcelas() {
  const n = parseInt(document.getElementById('ctParcelas')?.value)||1;
  const total = parseFloat(document.getElementById('ctValor')?.value)||0;
  const el = document.getElementById('ctPreviewParcelas');
  if (!el) return;
  if (n <= 1 || total === 0) { el.innerHTML=''; return; }
  const parcela = total / n;
  el.innerHTML = `<div class="p-2 rounded" style="background:#f0f4ff;border:1px solid #c7d2fe;font-size:0.85rem">
    <strong>${n}x de ${parcela.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</strong>
    — vencimentos mensais a partir do 1º vencimento acima
  </div>`;
}

async function salvarConta(tipo) {
  const desc = document.getElementById('ctDesc').value.trim();
  const valor = parseFloat(document.getElementById('ctValor').value)||0;
  const venc = document.getElementById('ctVenc').value;
  const n = parseInt(document.getElementById('ctParcelas').value)||1;
  if (!desc||!valor) { toast('Preencha os campos obrigatórios','danger'); return; }
  const sheet = tipo==='pagar'?'contas_pagar':'contas_receber';
  const ent = document.getElementById('ctEnt').value;
  try {
    if (n <= 1) {
      const data = { descricao:desc, valor, vencimento:venc, status:'pendente',
        ...(tipo==='pagar'?{fornecedor:ent}:{cliente:ent}) };
      await insert(sheet, data);
    } else {
      const parcela = parseFloat((valor / n).toFixed(2));
      const [ano, mes, dia] = venc.split('-').map(Number);
      for (let i = 0; i < n; i++) {
        const d = new Date(ano, mes - 1 + i, dia);
        const vencParcela = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const data = {
          descricao: `${desc} (${i+1}/${n})`,
          valor: parcela,
          vencimento: vencParcela,
          status: 'pendente',
          ...(tipo==='pagar'?{fornecedor:ent}:{cliente:ent})
        };
        await insert(sheet, data);
      }
    }
    toast(n > 1 ? `${n} parcelas criadas!` : 'Conta salva!');
    closeModal();
    renderFinanceiro(tipo);
  } catch(e) { toast(e.message,'danger'); }
}

async function baixarFuncionario(id) {
  if (!confirm('Confirmar pagamento desta costureira?')) return;
  await update('contas_pagar', id, {status:'pago'});
  toast('Pagamento registrado!'); Cache.clear('contas_pagar');
  renderFinanceiro('funcionarios');
}

async function baixarConta(sheet, id, status) {
  if (!confirm('Confirmar baixa?')) return;
  await update(sheet,id,{status}); toast('Baixa realizada!'); Cache.clear(sheet);
  renderFinanceiro(sheet==='contas_pagar'?'pagar':'receber');
}

async function delConta(sheet, id) {
  if (!confirm('Excluir esta conta?')) return;
  await remove(sheet,id); toast('Removida.'); renderFinanceiro(sheet==='contas_pagar'?'pagar':'receber');
}

// ═══════════════════════════════════════════════════════
// RELATÓRIOS
// ═══════════════════════════════════════════════════════
async function renderRelatorios() {
  const tipos = [
    {k:'lucro_pedidos',label:'Lucro por Pedido'},
    {k:'vendas',label:'Vendas PDV'},
    {k:'clientes',label:'Clientes'},
    {k:'produtos',label:'Produtos'},
    {k:'estoque',label:'Estoque'}
  ];
  let tipoAtual = 'lucro_pedidos';

  async function render(tipo) {
    tipoAtual = tipo;
    const cont = document.getElementById('relContent');
    if (cont) cont.innerHTML = loading();

    let dados = [], colunas = [];

    if (tipo==='lucro_pedidos') {
      const [pedidos, contasPagar] = await Promise.all([getAll('clientes'), getAll('contas_pagar')]);
      colunas = ['Cliente','Peça','Data','Receita','Custo','Lucro','Margem'];
      dados = pedidos.map(p => {
        const desc = `${p.tipo_peca||'Uniforme'} — ${p.nome}`;
        const custo = contasPagar
          .filter(c => (c.descricao||'').includes(`— ${desc}`))
          .reduce((s,c) => s+(parseFloat(c.valor)||0), 0);
        const receita = parseFloat(p.valor_total)||0;
        const lucro = receita - custo;
        const margem = receita > 0 ? ((lucro/receita)*100).toFixed(1)+'%' : '—';
        return { _lucro: lucro, _receita: receita,
          Cliente: p.nome, Peça: p.tipo_peca||'—', Data: fmtDate(p.data_pedido),
          Receita: fmtMoney(receita), Custo: fmtMoney(custo),
          Lucro: (lucro>=0?'+':'')+fmtMoney(lucro), Margem: margem,
          _cor: lucro < 0 ? 'table-danger' : lucro === 0 ? '' : ''
        };
      }).sort((a,b) => b._receita - a._receita);

      const totReceita = dados.reduce((s,r)=>s+r._receita,0);
      const totCusto   = dados.reduce((s,r)=>s+(r._receita-(r._lucro+r._receita-r._receita)),0);
      const totLucro   = dados.reduce((s,r)=>s+r._lucro,0);
      const totMargem  = totReceita > 0 ? ((totLucro/totReceita)*100).toFixed(1)+'%' : '—';

      if (cont) cont.innerHTML = `
        <div class="row g-3 mb-3">
          <div class="col-sm-4"><div class="stat-card blue p-3 rounded"><div class="stat-label">Total Faturado</div><div class="stat-value fs-5">${fmtMoney(totReceita)}</div></div></div>
          <div class="col-sm-4"><div class="stat-card red p-3 rounded"><div class="stat-label">Total Custos</div><div class="stat-value fs-5">${fmtMoney(totReceita-totLucro)}</div></div></div>
          <div class="col-sm-4"><div class="stat-card green p-3 rounded"><div class="stat-label">Lucro Total</div><div class="stat-value fs-5">${fmtMoney(totLucro)} <small class="fs-6 opacity-75">(${totMargem})</small></div></div></div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-2">
          <strong>${dados.length} pedidos</strong>
          <button class="btn btn-outline-secondary btn-sm no-print" onclick="window.print()"><i class="fas fa-print me-1"></i>Imprimir</button>
        </div>
        <div class="card"><div class="card-body p-0"><div class="table-responsive">
          <table class="table mb-0">
            <thead><tr>${colunas.map(c=>`<th class="ps-3">${c}</th>`).join('')}</tr></thead>
            <tbody>
            ${dados.length ? dados.map(row=>`<tr class="${row._cor||''}">
              ${colunas.map((c,i)=>`<td class="${i===0?'ps-3 fw-semibold':''}${c==='Lucro'?(row._lucro<0?' text-danger':' text-success'):''}">${escHtml(String(row[c]??'—'))}</td>`).join('')}
            </tr>`).join('') : emptyState('chart-bar','Nenhum pedido encontrado')}
            </tbody>
          </table>
        </div></div></div>`;
      return;
    }

    if (tipo==='vendas') {
      dados = (await getAll('vendas')).filter(v=>v.status==='fechada');
      colunas = ['Pedido','Cliente','Data','Pagamento','Total','Status'];
      dados = dados.map(v=>({Pedido:v.numero,Cliente:v.cliente_nome||'—',Data:fmtDateTime(v.data),Pagamento:v.forma_pagamento,Total:fmtMoney(v.total),Status:v.status}));
    } else if (tipo==='clientes') {
      dados = await getAll('clientes_cad');
      colunas = ['Nome','CPF/CNPJ','Telefone','Cidade','UF'];
      dados = dados.map(c=>({Nome:c.nome,['CPF/CNPJ']:c.cnpj||c.cpf_cnpj||'—',Telefone:c.telefone||'—',Cidade:c.cidade||'—',UF:c.estado||'—'}));
    } else if (tipo==='produtos') {
      dados = await getAll('produtos');
      colunas = ['Código','Nome','Categoria','UN','Custo','Venda','Estoque'];
      dados = dados.map(p=>({Código:p.codigo,Nome:p.nome,Categoria:p.categoria||'—',UN:p.unidade,Custo:fmtMoney(p.preco_custo),Venda:fmtMoney(p.preco_venda),Estoque:parseFloat(p.estoque||0).toFixed(3)}));
    } else if (tipo==='estoque') {
      const ps = await getAll('produtos');
      dados = ps.map(p=>({Código:p.codigo,Nome:p.nome,Estoque:parseFloat(p.estoque||0).toFixed(3),['Est.Mín']:parseFloat(p.estoque_minimo||0).toFixed(3),Situação:parseFloat(p.estoque||0)<=0?'Zerado':parseFloat(p.estoque||0)<=parseFloat(p.estoque_minimo||0)?'Baixo':'Normal'}));
      colunas = ['Código','Nome','Estoque','Est.Mín','Situação'];
    }

    if (cont) cont.innerHTML = `
      <div class="d-flex justify-content-between align-items-center mb-2">
        <strong>${dados.length} registros</strong>
        <button class="btn btn-outline-secondary btn-sm no-print" onclick="window.print()"><i class="fas fa-print me-1"></i>Imprimir</button>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table mb-0">
              <thead><tr>${colunas.map(c=>`<th class="ps-3">${c}</th>`).join('')}</tr></thead>
              <tbody>
              ${dados.length ? dados.map(row=>`<tr>${colunas.map((c,i)=>`<td class="${i===0?'ps-3':''}">${escHtml(String(row[c]??'—'))}</td>`).join('')}</tr>`).join('')
              : emptyState('chart-bar','Nenhum dado encontrado')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  document.getElementById('pageContent').innerHTML = `
  <div class="card mb-4">
    <div class="card-body d-flex gap-2 flex-wrap">
      ${tipos.map(t=>`<button class="btn btn-sm btn-${t.k===tipoAtual?'primary':'outline-secondary'}" id="relBtn_${t.k}" onclick="document.querySelectorAll('[id^=relBtn_]').forEach(b=>b.className='btn btn-sm btn-outline-secondary');this.className='btn btn-sm btn-primary';renderRelContent('${t.k}')">${t.label}</button>`).join('')}
    </div>
  </div>
  <div id="relContent">${loading()}</div>`;

  window.renderRelContent = render;
  render(tipoAtual);
}
